<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="Viewport" content="width=device-width">
        <title>Challenge Encriptador One Next</title>
        <link rel="stylesheet" href="reset.css">
        <link rel="stylesheet" href="jrstyle.css">
    </head>
    <body>

        <header>
            <img class="logo" src="Logo.png" alt="logo Alura">
            <h1>Encriptador de textos</h1>

        </header>
        <main class="contenedor-principal">
            <section class="seccion1">
                <div>
                    <textarea class="area" placeholder="Ingrese su mensaje"></textarea>
                    
                </div>
                <div class="ayuda"> <img src="bi_exclamation-circle-fill.png"> Solo letras minúsculas y sin acentos</div>
                <div class="interaccion">
                    <button id="encriptar">Encriptar</button>
                    <button id="desencriptar">Desencriptar</button>
                </div>
                

            </section>
            <section class="seccion2">
                
                <div>
                    <img class="dibujo" src="Muñeco.png" alt=" munheco Alura">
                </div>
                <div class="contenedorh3">
                    <h3>No se encontro ningún texto</h3>
                </div>
                <div class="parrafo">
                    <p>Ingresa el texto que deseas encriptar o desencriptar</p>
                </div>
                <div class="final">
                    <textarea id="resultado"></textarea>
                    <button id="copiar">Copiar</button>
    
                </div>
            </section>
            

        </main>
        <footer class="pie-pagina">
            <p>&copy Copyright Alura</p>
            <p>Jofrannys Arcila</p>


        </footer>
        <script src="jrcode.js"></script>
    </body>
</html>
